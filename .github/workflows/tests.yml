name: Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      ADMIN_BASE_URL: ${{ secrets.ADMIN_BASE_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      GIT_REP_URL: ${{ secrets.GIT_REP_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Create artifact directories
        run: mkdir -p allure/results test-results

      - name: Run pytest smoke suite
        run: |
          python -m pytest \
            -m "not utility" \
            tests/api/test_auth_login.py \
            tests/e2e/test_auth.py \
            --alluredir=allure/results \
            --junitxml=test-results/pytest.xml

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure/results
          if-no-files-found: warn

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junitxml
          path: test-results/pytest.xml
          if-no-files-found: warn
