name: Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASE_URL: ${{ vars.BASE_URL }}
      ADMIN_BASE_URL: ${{ vars.ADMIN_BASE_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      GIT_REP_URL: ${{ vars.GIT_REP_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Create artifact directories
        run: mkdir -p allure/results test-results

      - name: Run pytest smoke suite
        run: |
          python -m pytest \
            -m "not utility" \
            tests/api/test_auth_login.py \
            tests/e2e/test_auth.py \
            --alluredir=allure/results \
            --junitxml=test-results/pytest.xml

      - name: Set up Java for Allure CLI
        if: always()
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure CLI
        if: always()
        env:
          ALLURE_VERSION: "2.42.0"
        run: |
          curl -sSL "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz" -o /tmp/allure.tgz
          tar -xzf /tmp/allure.tgz -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/allure-${ALLURE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Generate Allure HTML report
        if: always()
        run: |
          if [ ! -d allure/results ] || [ -z "$(find allure/results -mindepth 1 -print -quit)" ]; then
            echo "No Allure results found. Skipping report generation."
            exit 0
          fi

          allure generate allure/results -o allure/report --clean --single-file

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure/results
          retention-days: 7
          if-no-files-found: warn

      - name: Upload existing test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure/report
          retention-days: 7
          if-no-files-found: warn
